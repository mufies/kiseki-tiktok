version: '3.8'

services:
  # Infrastructure Services
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - tiktok-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - tiktok-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_MULTIPLE_DATABASES: userdb,videodb,eventdb,interactiondb,notificationdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    networks:
      - tiktok-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - tiktok-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Microservices
  user-service:
    build:
      context: ./user-service/userservice
      dockerfile: Dockerfile
    container_name: user-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
      - "9090:9090"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/userdb
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      GRPC_SERVER_PORT: 9090
    networks:
      - tiktok-network

  video-service:
    build:
      context: ./video-service/videoservice
      dockerfile: Dockerfile
    container_name: video-service
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8082:8082"
      - "9091:9091"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/videodb
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      GRPC_SERVER_PORT: 9091
    networks:
      - tiktok-network

  event-service:
    build:
      context: ./event-service
      dockerfile: Dockerfile
    container_name: event-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8083:8083"
      - "9092:9092"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=eventdb;Username=admin;Password=admin123"
      ConnectionStrings__RedisConnection: "redis:6379"
      Kestrel__Endpoints__Http__Url: "http://0.0.0.0:8083"
      Kestrel__Endpoints__Grpc__Url: "http://0.0.0.0:9092"
      Kestrel__Endpoints__Grpc__Protocols: "Http2"
    networks:
      - tiktok-network

  interaction-service:
    build:
      context: ./interaction-service/interactionservice
      dockerfile: Dockerfile
    container_name: interaction-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/interactiondb
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      GRPC_CLIENT_VIDEO_SERVICE_ADDRESS: static://video-service:9091
    networks:
      - tiktok-network

  notification-service:
    build:
      context: ./notification-service/NotificationService
      dockerfile: Dockerfile
    container_name: notification-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8085:8085"
      - "9093:9093"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=notificationdb;Username=admin;Password=admin123"
      ConnectionStrings__RedisConnection: "redis:6379"
      Kafka__BootstrapServers: "kafka:9092"
      Kestrel__Endpoints__Http__Url: "http://0.0.0.0:8085"
      Kestrel__Endpoints__Grpc__Url: "http://0.0.0.0:9093"
      Kestrel__Endpoints__Grpc__Protocols: "Http2"
    networks:
      - tiktok-network

  api-gateway:
    build:
      context: ./api-gateway/apigateway
      dockerfile: Dockerfile
    container_name: api-gateway
    depends_on:
      - user-service
      - video-service
      - event-service
      - interaction-service
      - notification-service
    ports:
      - "8080:8080"
    environment:
      USER_SERVICE_URL: http://user-service:8081
      VIDEO_SERVICE_URL: http://video-service:8082
      EVENT_SERVICE_URL: http://event-service:8083
      INTERACTION_SERVICE_URL: http://interaction-service:8084
      NOTIFICATION_SERVICE_URL: http://notification-service:8085
    networks:
      - tiktok-network

networks:
  tiktok-network:
    driver: bridge

volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  postgres-data:
  redis-data:
