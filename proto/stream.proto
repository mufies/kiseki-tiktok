syntax = "proto3";

package stream;

// Java package options
option java_multiple_files = true;
option java_package = "com.kiseki.stream.grpc";
option java_outer_classname = "StreamProto";

// Go package option
option go_package = "github.com/kiseki/stream-service/internal/grpc/streampb";

// C# namespace option
option csharp_namespace = "StreamService.Protos";

// Python package option
option py_generic_services = true;

service StreamService {
  // Get stream by ID
  rpc GetStream(GetStreamRequest) returns (GetStreamResponse);

  // Get stream by stream key (for authentication)
  rpc GetStreamByKey(GetStreamByKeyRequest) returns (GetStreamByKeyResponse);

  // Get all live streams
  rpc GetLiveStreams(GetLiveStreamsRequest) returns (GetLiveStreamsResponse);

  // Get user's streams
  rpc GetUserStreams(GetUserStreamsRequest) returns (GetUserStreamsResponse);

  // Update stream status (internal use)
  rpc UpdateStreamStatus(UpdateStreamStatusRequest) returns (UpdateStreamStatusResponse);

  // Get stream statistics
  rpc GetStreamStats(GetStreamStatsRequest) returns (GetStreamStatsResponse);
}

// Messages
message GetStreamRequest {
  string stream_id = 1;
}

message GetStreamResponse {
  Stream stream = 1;
}

message GetStreamByKeyRequest {
  string stream_key = 1;
}

message GetStreamByKeyResponse {
  Stream stream = 1;
}

message GetLiveStreamsRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message GetLiveStreamsResponse {
  repeated Stream streams = 1;
  int32 total_count = 2;
}

message GetUserStreamsRequest {
  string user_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message GetUserStreamsResponse {
  repeated Stream streams = 1;
  int32 total_count = 2;
}

message UpdateStreamStatusRequest {
  string stream_id = 1;
  string status = 2; // "offline", "live", "ending"
}

message UpdateStreamStatusResponse {
  bool success = 1;
  string message = 2;
}

message GetStreamStatsRequest {
  string stream_id = 1;
}

message GetStreamStatsResponse {
  StreamStats stats = 1;
}

// Data models
message Stream {
  string id = 1;
  string user_id = 2;
  string stream_key = 3;
  string title = 4;
  string description = 5;
  string thumbnail_url = 6;
  string status = 7; // "offline", "live", "ending"
  int64 viewer_count = 8;
  int64 started_at = 9; // Unix timestamp
  int64 ended_at = 10; // Unix timestamp
  int64 created_at = 11; // Unix timestamp
  int64 updated_at = 12; // Unix timestamp
  bool save_vod = 13;
  StreamOwner owner = 14; // Optional user info
}

message StreamOwner {
  string user_id = 1;
  string username = 2;
  string display_name = 3;
  string profile_image_url = 4;
  bool is_verified = 5;
}

message StreamStats {
  string stream_id = 1;
  int64 viewer_count = 2;
  int64 peak_viewers = 3;
  int64 total_viewers = 4;
  int64 duration_seconds = 5;
  double average_bitrate = 6;
  int64 video_packets = 7;
  int64 audio_packets = 8;
}
