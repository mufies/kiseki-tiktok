syntax = "proto3";

package video;

// Java package options
option java_multiple_files = true;
option java_package = "com.kiseki.video.grpc";
option java_outer_classname = "VideoProto";

// Go package option
option go_package = "github.com/kiseki/video-service/internal/grpc/videopb";

// C# namespace option
option csharp_namespace = "VideoService.Protos";

service VideoService {


  // Get details of a single video (alias for backward compatibility)
  rpc GetVideo(GetVideoRequest) returns (GetVideoResponse);

  // Get a batch of videos (for feed)
  rpc GetVideos(GetVideosRequest) returns (GetVideosResponse);
}

message GetVideoByIdRequest {
  string video_id = 1;
}

message GetVideoByIdResponse {
  Video video = 1;
}

message GetVideoRequest {
  string video_id = 1;
  optional string user_id = 2;
}

message GetVideoResponse {
  Video video = 1;
}

message GetVideosRequest {
  int32 limit = 1;
  int32 offset = 2;
  optional string user_id = 3;
}

message GetVideosResponse {
  repeated Video videos = 1;
}

message Video {
  string video_id = 1;
  string user_id = 2;
  string title = 3;
  repeated string categories = 4;
  repeated string hashtags = 5;
  VideoOwner owner = 6;
  string description = 7;
  string thumbnail_url = 8;
  int64 created_at = 9;
  bool is_liked = 10;
  bool is_bookmarked = 11;
  int64 like_count = 12;
  int64 comment_count = 13;
  int64 bookmark_count = 14;
  int64 view_count = 15;
}

message VideoOwner {
  string user_id = 1;
  string username = 2;
  string display_name = 3;
  string profile_image_url = 4;
  int64 followers_count = 5;
  int64 following_count = 6;
  bool is_verified = 7;
  bool is_followed = 8;
}
