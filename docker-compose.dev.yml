# Override file for development with additional debugging tools
version: '3.8'

services:
  # Kafka UI for monitoring Kafka topics and messages
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: tiktok-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - tiktok-network

  # Redis Commander for monitoring Redis
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: tiktok-redis-commander
    depends_on:
      - redis
    ports:
      - "8091:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    networks:
      - tiktok-network

  # pgAdmin for PostgreSQL management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tiktok-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tiktok.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - tiktok-network

volumes:
  pgadmin_data:
